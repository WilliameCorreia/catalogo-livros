# =============================================================================
# FRONTEND - Next.js do catálogo
# Deployment (2 réplicas) + Service NodePort 30080.
# É a ÚNICA porta exposta para fora do cluster.
#
# Como todas as chamadas são server-side (rodam dentro do pod), o frontend usa
# o DNS interno "backend-service" para falar com a API. O navegador nunca vê
# essa URL - ele só recebe HTML pronto.
#
# Aplique com: kubectl apply -f k8s/frontend/
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: catalogo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend
      annotations:
        version: "1.0.0"

    spec:
      containers:
      - name: frontend
        image: williame/catalogo_livros_frontend:1.0.0
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        - name: BACKEND_INTERNAL_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NEXT_PUBLIC_API_URL   # contém: http://backend-service:3001

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 45
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

---
# =============================================================================
# SERVICE NodePort - única porta de entrada do mundo externo.
#
# Caminho do request:
#   navegador → localhost:30080  (host)
#             → 30080 do nó Kind  (extraPortMappings)
#             → Service NodePort 30080
#             → pod do frontend porta 3000
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: catalogo

spec:
  type: NodePort

  selector:
    app: frontend

  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
      protocol: TCP
