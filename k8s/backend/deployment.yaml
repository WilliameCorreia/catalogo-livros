# =============================================================================
# BACKEND - API Express do catálogo
# Deployment (2 réplicas, stateless) + Service ClusterIP (só interno).
# O frontend acessa este backend pelo nome "backend-service" via DNS interno.
#
# Aplique com: kubectl apply -f k8s/backend/
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: catalogo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
      annotations:
        version: "1.0.0"

    spec:
      containers:
      - name: backend
        image: williame/catalogo_livros_backend:1.0.0
        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ALLOWED_ORIGINS
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DATABASE_URL

        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

---
# =============================================================================
# SERVICE ClusterIP - backend NÃO é exposto fora do cluster.
# O frontend é quem chama o backend pelo DNS "backend-service".
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: catalogo

spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
