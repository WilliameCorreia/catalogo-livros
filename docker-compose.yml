services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalogo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: catalogo_livros
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalogo -d catalogo_livros"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      DATABASE_URL: postgresql://catalogo:${POSTGRES_PASSWORD}@postgres:5432/catalogo_livros
      PORT: 3001
      NODE_ENV: production
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  pgdata:
